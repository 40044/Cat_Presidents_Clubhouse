<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Cat Presidents Clubhouse 🐱</title>
    <style>
        body { 
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; 
            background-color: #1a2634; color: #e0e0e0; margin: 0; padding: 20px; display: none; 
        }
        .header { text-align: center; padding: 20px 0; }
        .logo-text { 
            color: #ff85a2; font-size: 3em; font-weight: bold; letter-spacing: 4px;
            text-transform: uppercase; text-shadow: 0 0 10px rgba(255, 133, 162, 0.5); margin: 0;
        }
        .main-container { display: flex; gap: 20px; justify-content: center; flex-wrap: wrap; max-width: 1200px; margin: 0 auto; }
        .column { background: #253341; padding: 20px; border-radius: 20px; border: 3px solid #ff85a2; box-shadow: 0 10px 30px rgba(0,0,0,0.5); }
        .left { flex: 1; min-width: 280px; max-height: 750px; overflow-y: auto; } 
        .middle { flex: 2; min-width: 350px; } 
        .right { flex: 1; min-width: 300px; }  
        .status-box { background: #3d3d29; padding: 20px; border-radius: 15px; border: 2px dashed #fbc02d; text-align: center; }
        .plan-entry {
            background: #2d3d4d; padding: 10px; margin-bottom: 8px; border-radius: 10px;
            border-left: 5px solid #8bc34a; display: flex; justify-content: space-between; align-items: center;
        }
        .time-tag { background: #ff85a2; color: white; padding: 2px 8px; border-radius: 5px; font-size: 0.85em; font-weight: bold; }
        h3 { color: #ff85a2; border-bottom: 1px solid #3d4d5d; padding-bottom: 5px; }
        .edit-link { display: block; margin-top: 15px; color: #ff85a2; text-decoration: none; font-size: 0.85em; text-align: center; background: rgba(255, 133, 162, 0.1); padding: 8px; border-radius: 10px; }
    </style>
</head>
<body>

    <div class="header">
        <p class="logo-text">🐾 Cat Presidents 🐾</p>
    </div>

    <div class="main-container">
        <div class="column left">
            <h3>🎁 SSO Codes</h3>
            <div id="code-list">Lade Codes...</div>
        </div>

        <div class="column middle">
            <h3>📊 Champi-Barometer</h3>
            <div class="status-box">
                <p><strong>HEUTE: <span id="heutiger-tag">...</span></strong></p>
                <h2 id="champi-name" style="color: #ff85a2; margin: 10px 0; font-size: 1.8em;">Lade Daten...</h2>
                <p>Countdown: <span id="countdown" style="font-weight: bold; color: #fbc02d; font-size: 1.6em;">--:--</span></p>
            </div>
            <h3 style="margin-top: 25px;">📅 Tagesplan</h3>
            <div id="tages-plan" style="max-height: 450px; overflow-y: auto; padding-right: 5px;"></div>
        </div>

        <div class="column right">
            <h3>💬 Club-Chat</h3>
            <script src="https://minnit.chat/js/embed.js?c=1772345192" defer></script>
            <span class="minnit-chat-sembed" data-chatname="https://organizations.minnit.chat/443778136316393/c/Main?embed&&dark=1" data-style="width:100%; height:550px;" data-version="1.55">Chat</span>
        </div>
    </div>

    <script>
        let globaleChampis = [];
        const tage = ["Sonntag", "Montag", "Dienstag", "Mittwoch", "Donnerstag", "Freitag", "Samstag"];

        function checkPassword() {
            if (localStorage.getItem("club_zugang") === "erfolgreich") {
                document.body.style.display = "block";
                init();
            } else {
                let pw = prompt("Club-Passwort:");
                if (pw === "CatPresidents2026") {
                    localStorage.setItem("club_zugang", "erfolgreich");
                    location.reload();
                }
            }
        }

        async function init() {
            await loadCodes();
            await loadChampiData();
            updateDisplay();
            setInterval(updateDisplay, 1000);
        }

        async function loadChampiData() {
            const url = 'https://docs.google.com/spreadsheets/d/e/2PACX-1vTsN2swAhGSI-5FQyTFtiTi2Uvab6WFoXfOm-pz9N9X9G1TeGSyAI5yr1aiD_p0FdOSr78BATKXXtaB/pub?gid=0&single=true&output=csv';
            
            try {
                const res = await fetch(url);
                const text = await res.text();
                
                // Erkennt Tabulator (\t) oder Semikolon (;)
                let separator = text.includes('\t') ? '\t' : ';';
                const rows = text.split(/\r?\n/).map(r => r.split(separator));
                
                const d = new Date();
                const heuteName = tage[d.getDay()]; 
                document.getElementById('heutiger-tag').innerText = heuteName;

                // Spalten-Suche (Header)
                let colIdx = -1;
                if (rows.length > 0) {
                    const header = rows[0];
                    for(let i=0; i<header.length; i++) {
                        let hName = header[i].trim().toLowerCase();
                        if(hName.startsWith(heuteName.substring(0,3).toLowerCase())) {
                            colIdx = i;
                            break;
                        }
                    }
                }

                // Notfall-Fallback falls Header-Suche scheitert
                if(colIdx === -1) colIdx = d.getDay() === 0 ? 7 : d.getDay();

                let list = [];
                for(let i = 1; i < rows.length; i++) {
                    let row = rows[i];
                    if (row[0] && row[colIdx]) {
                        let timeStr = row[0].trim();
                        let name = row[colIdx].trim();
                        
                        if(timeStr && name && name.length > 2 && name !== "---") {
                            let parts = timeStr.split(':');
                            let h = parseInt(parts[0]);
                            let m = parseInt(parts[1]);
                            if(!isNaN(h)) {
                                list.push({ 
                                    min: h * 60 + m,
                                    display: (h < 10 ? '0'+h : h) + ":" + (m < 10 ? '0'+m : m),
                                    name: name 
                                });
                            }
                        }
                    }
                }
                globaleChampis = list.sort((a,b) => a.min - b.min);
            } catch(e) { 
                document.getElementById('champi-name').innerText = "Fehler beim Laden";
            }
        }

        function updateDisplay() {
            if (globaleChampis.length === 0) return;
            const now = new Date();
            const curMin = now.getHours() * 60 + now.getMinutes();
            let next = null;
            let html = '';

            globaleChampis.forEach(c => {
                const past = c.min <= curMin;
                html += `<div class="plan-entry" style="${past ? 'opacity:0.3' : ''}">
                            <span>${c.name}</span><span class="time-tag">${c.display}</span>
                         </div>`;
                if(!next && c.min > curMin) {
                    let target = new Date();
                    target.setHours(Math.floor(c.min/60), c.min%60, 0, 0);
                    next = { ...c, target };
                }
            });

            document.getElementById('tages-plan').innerHTML = html;
            if(next) {
                const diff = next.target - now;
                const mins = Math.floor(diff/60000);
                const secs = Math.floor((diff%60000)/1000);
                document.getElementById('champi-name').innerText = next.name;
                document.getElementById('countdown').innerText = mins + ":" + (secs < 10 ? '0' : '') + secs;
            } else {
                document.getElementById('champi-name').innerText = "Pause bis morgen!";
                document.getElementById('countdown').innerText = "--:--";
            }
        }

        async function loadCodes() {
            const url = 'https://docs.google.com/spreadsheets/d/e/2PACX-1vRlKQDgI4SCBqe8Kv0ZSvzDIfXW5YxyU3kLrR4h0LgK7vMdpNxgcpJfU0jP4xD0v9FOs7JQ74StZOHC/pub?gid=0&single=true&output=csv';
            try {
                const res = await fetch(url);
                const text = await res.text();
                const rows = text.split(/\r?\n/).slice(1);
                let html = '';
                rows.forEach(r => {
                    const c = r.split(',');
                    if(c[0]) html += `<div class="plan-entry"><strong>${c[0].replace(/"/g,'')}</strong><span>${c[1]||''}</span></div>`;
                });
                html += `<a href="https://docs.google.com/spreadsheets/d/1qBZrDQApoIYHCQ9Q2rlFpjQ9KKZWaEBOnf7lyojjohs/edit#gid=0" target="_blank" class="edit-link">➕ Codes verwalten</a>`;
                document.getElementById('code-list').innerHTML = html;
            } catch(e) {}
        }
        checkPassword();
    </script>
</body>
</html>
