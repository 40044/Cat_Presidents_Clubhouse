<script>
        let globaleChampis = [];
        const tage = ["Sonntag", "Montag", "Dienstag", "Mittwoch", "Donnerstag", "Freitag", "Samstag"];

        function checkPassword() {
            if (localStorage.getItem("club_zugang") === "erfolgreich") {
                document.body.style.display = "block";
                init();
            } else {
                let pw = prompt("Club-Passwort:");
                if (pw === "CatPresidents2026") {
                    localStorage.setItem("club_zugang", "erfolgreich");
                    location.reload();
                }
            }
        }

        async function init() {
            await loadCodes();
            await loadChampiData();
            updateDisplay();
            setInterval(updateDisplay, 1000);
        }

        async function loadChampiData() {
            const url = 'https://docs.google.com/spreadsheets/d/e/2PACX-1vTsN2swAhGSI-5FQyTFtiTi2Uvab6WFoXfOm-pz9N9X9G1TeGSyAI5yr1aiD_p0FdOSr78BATKXXtaB/pub?gid=0&single=true&output=csv';
            
            try {
                const res = await fetch(url);
                const text = await res.text();
                
                // WICHTIG: Deine Datei nutzt Tabs (\t). Wir teilen die Zeilen exakt so auf:
                const rows = text.split(/\r?\n/).map(r => r.split('\t'));
                
                const d = new Date();
                const heuteName = tage[d.getDay()]; 
                document.getElementById('heutiger-tag').innerText = heuteName;

                // Wir suchen die Spalte für heute (z.B. Donnerstag)
                let colIdx = -1;
                if (rows.length > 0) {
                    const header = rows[0];
                    for(let i=0; i<header.length; i++) {
                        let hName = header[i].trim();
                        // Wir vergleichen nur die ersten 3 Buchstaben (hilft bei "Mitwoch")
                        if(hName.toLowerCase().startsWith(heuteName.substring(0,3).toLowerCase())) {
                            colIdx = i;
                            break;
                        }
                    }
                }

                if(colIdx === -1) {
                    // Falls die Suche fehlschlägt, nutzen wir den Standard-Index
                    colIdx = d.getDay() === 0 ? 7 : d.getDay();
                }

                let list = [];
                for(let i = 1; i < rows.length; i++) {
                    let row = rows[i];
                    if (row[0] && row[colIdx]) {
                        let timeStr = row[0].trim();
                        let name = row[colIdx].trim();
                        
                        if(timeStr && name && name.length > 2) {
                            let parts = timeStr.split(':');
                            let h = parseInt(parts[0]);
                            let m = parseInt(parts[1]);
                            if(!isNaN(h)) {
                                list.push({ 
                                    min: h * 60 + m,
                                    display: (h < 10 ? '0'+h : h) + ":" + (m < 10 ? '0'+m : m),
                                    name: name 
                                });
                            }
                        }
                    }
                }
                globaleChampis = list.sort((a,b) => a.min - b.min);
            } catch(e) { console.error("Datenfehler"); }
        }

        function updateDisplay() {
            if (globaleChampis.length === 0) return;
            const now = new Date();
            const curMin = now.getHours() * 60 + now.getMinutes();
            let next = null;
            let html = '';

            globaleChampis.forEach(c => {
                const past = c.min <= curMin;
                html += `<div class="plan-entry" style="${past ? 'opacity:0.3' : ''}">
                            <span>${c.name}</span><span class="time-tag">${c.display}</span>
                         </div>`;
                if(!next && c.min > curMin) {
                    let target = new Date();
                    target.setHours(Math.floor(c.min/60), c.min%60, 0, 0);
                    next = { ...c, target };
                }
            });

            document.getElementById('tages-plan').innerHTML = html;
            if(next) {
                const diff = next.target - now;
                const mins = Math.floor(diff/60000);
                const secs = Math.floor((diff%60000)/1000);
                document.getElementById('champi-name').innerText = next.name;
                document.getElementById('countdown').innerText = mins + ":" + (secs < 10 ? '0' : '') + secs;
            } else {
                document.getElementById('champi-name').innerText = "Pause bis morgen!";
                document.getElementById('countdown').innerText = "--:--";
            }
        }

        async function loadCodes() {
            const url = 'https://docs.google.com/spreadsheets/d/e/2PACX-1vRlKQDgI4SCBqe8Kv0ZSvzDIfXW5YxyU3kLrR4h0LgK7vMdpNxgcpJfU0jP4xD0v9FOs7JQ74StZOHC/pub?gid=0&single=true&output=csv';
            try {
                const res = await fetch(url);
                const text = await res.text();
                const rows = text.split(/\r?\n/).slice(1);
                let html = '';
                rows.forEach(r => {
                    const c = r.split(',');
                    if(c[0]) html += `<div class="plan-entry"><strong>${c[0].replace(/"/g,'')}</strong><span>${c[1]||''}</span></div>`;
                });
                html += `<a href="https://docs.google.com/spreadsheets/d/1qBZrDQApoIYHCQ9Q2rlFpjQ9KKZWaEBOnf7lyojjohs/edit#gid=0" target="_blank" style="display:block;text-align:center;color:#ff85a2;text-decoration:none;margin-top:10px;font-size:0.8em;">➕ Codes verwalten</a>`;
                document.getElementById('code-list').innerHTML = html;
            } catch(e) {}
        }
        checkPassword();
    </script><!DOCTYPE html>

    <script>
        let globaleChampis = [];
        const tage = ["Sonntag", "Montag", "Dienstag", "Mittwoch", "Donnerstag", "Freitag", "Samstag"];

        function checkPassword() {
            if (localStorage.getItem("club_zugang") === "erfolgreich") {
                document.body.style.display = "block";

            } else {

            }
        }

        async function init() {
            await loadCodes();
            await loadChampiData();
            updateDisplay();
            setInterval(updateDisplay, 1000);
        }

        async function loadChampiData() {
            const url = 'https://docs.google.com/spreadsheets/d/e/2PACX-1vTsN2swAhGSI-5FQyTFtiTi2Uvab6WFoXfOm-pz9N9X9G1TeGSyAI5yr1aiD_p0FdOSr78BATKXXtaB/pub?gid=0&single=true&output=csv';
            
            try {
                const res = await fetch(url);
                const text = await res.text();
                
                // Erkennt Tabulator (\t) oder Semikolon (;)
                let separator = text.includes('\t') ? '\t' : ';';
                const rows = text.split(/\r?\n/).map(r => r.split(separator));
                
                const d = new Date();
                const dayIdx = d.getDay(); 
                document.getElementById('heutiger-tag').innerText = tage[dayIdx];

                // Spaltenindex: 0=Uhrzeit, 1=Mo, 2=Di, 3=Mi, 4=Do, 5=Fr, 6=Sa, 7=So
                let colIdx = dayIdx === 0 ? 7 : dayIdx;

                let list = [];
                for(let i = 1; i < rows.length; i++) {
                    let row = rows[i];
                    if (row.length > colIdx) {
                        let timeStr = row[0] ? row[0].trim() : "";
                        let name = row[colIdx] ? row[colIdx].trim() : "";
                        
                        if(timeStr && name && name.length > 2) {
                            let parts = timeStr.split(':');
                            let h = parseInt(parts[0]);
                            let m = parseInt(parts[1]);
                            if(!isNaN(h)) {
                                list.push({ 
                                    min: h * 60 + m,
                                    display: (h < 10 ? '0'+h : h) + ":" + (m < 10 ? '0'+m : m),
                                    name: name 
                                });
                            }
                        }
                    }
                }
                globaleChampis = list.sort((a,b) => a.min - b.min);
            } catch(e) { 
                document.getElementById('champi-name').innerText = "Daten-Fehler";
            }
        }

        function updateDisplay() {
            if (globaleChampis.length === 0) return;
            const now = new Date();
            const curMin = now.getHours() * 60 + now.getMinutes();
            let next = null;
            let html = '';

            globaleChampis.forEach(c => {
                const isCurrent = (curMin >= c.min && curMin < c.min + 5); // Markiert laufendes Champi für 5 Min
                const past = c.min < curMin && !isCurrent;
                
                html += `<div class="plan-entry" style="${past ? 'opacity:0.3; border-left-color: #555;' : (isCurrent ? 'border-left-color: #fbc02d; background: #3d3d29;' : '')}">

                         </div>`;
                
                if(!next && c.min > curMin) {

                    target.setHours(Math.floor(c.min/60), c.min%60, 0, 0);
