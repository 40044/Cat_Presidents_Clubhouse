<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Cat Presidents Clubhouse 🐱</title>
    <style>
        body { 
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; 
            /* Ein gemütliches, dunkles Blau-Grau statt grellem Hellblau */
            background-color: #1a2634; 
            color: #e0e0e0; 
            margin: 0;
            padding: 20px;
            display: none; 
        }
        
        .header { text-align: center; padding: 20px; }
        /* Ein schönes, sanftes Rosa/Pink für den Titel */
        h1 { color: #ff85a2; text-shadow: 2px 2px 4px rgba(0,0,0,0.3); }

        .main-container {
            display: flex;
            gap: 20px;
            justify-content: center;
            flex-wrap: wrap; 
        }

        .column {
            /* Dunkle Boxen statt weißer Boxen */
            background: #253341;
            padding: 20px;
            border-radius: 20px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.5);
            /* Ein weicherer Rand in Beerenfarbe */
            border: 3px solid #ff85a2;
        }

        .left { flex: 1; min-width: 250px; } 
        .middle { flex: 2; min-width: 350px; } 
        .right { flex: 1; min-width: 300px; }  

        .status-box {
            /* Die gelbe Box machen wir auch etwas dunkler und gemütlicher */
            background: #3d3d29;
            padding: 15px;
            border-radius: 15px;
            border: 2px dashed #fbc02d;
            text-align: center;
            color: #fff9c4;
        }

        .code-item {
            /* Dunklere Hintergründe für die Codes */
            background: #2d3d4d;
            padding: 10px;
            margin-bottom: 10px;
            border-radius: 10px;
            border-left: 5px solid #8bc34a;
            color: #ffffff;
        }

        .code-expired {
            border-left: 5px solid #f44336;
            color: #777;
            text-decoration: line-through;
            background: #2a2a2a;
        }

        h3 { color: #ff85a2; border-bottom: 1px solid #3d4d5d; padding-bottom: 5px; }
    </style>
</head>
<body>

    <div class="header">
        <h1>🐾 Cat Presidents 🐾</h1>
    </div>

    <div class="main-container">
        
        <div class="column left">
            <h3>🎁 SSO Codes</h3>
            <div class="code-item"><strong>STARSTABLE2026</strong></div>
            <div class="code-item"><strong>HAPPYCAT</strong></div>
            <div class="code-item code-expired"><strong>OLDCODE123</strong></div>
            <p><small>Codes werden bald über Google-Tabelle verwaltet!</small></p>
        </div>

        <div class="column middle">
            <h3>📊 Champi-Barometer</h3>
            <div class="status-box">
                <p><strong>Nächstes Championat:</strong></p>
                <h2 id="champi-name">Der Algorytmus wird noch erstellt... </h2>
                <p>Startet in: <span id="countdown">--:--</span></p>
            </div>
        </div>

        <div class="column right">
            <h3>💬 Club-Chat</h3>
            <script src="https://minnit.chat/js/embed.js?c=1772345192" defer></script>
            <span class="minnit-chat-sembed" 
              data-chatname="https://organizations.minnit.chat/443778136316393/c/Main?embed&&dark=1" 
              data-style="width:100%; height:500px; border-radius:15px;" 
              data-version="1.55">Chat</span>
        </div>

    </div>

    <script>
        // DAS GEDÄCHTNIS-SKRIPT
        function checkPassword() {
            let istEingeloggt = localStorage.getItem("club_zugang");

            if (istEingeloggt === "erfolgreich") {
                document.body.style.display = "block";
            } else {
                let pw = prompt("Bitte gib das Club-Passwort ein:");
                if (pw === "CatPresidents2026") {
                    localStorage.setItem("club_zugang", "erfolgreich");
                    document.body.style.display = "block";
                } else {
                    alert("Falsches Passwort! Bitte Seite neu laden.");
                }
            }
        }
        
        // Starte die Prüfung sofort
        checkPassword();
    </script>

</body>
</html>
