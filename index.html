<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Cat Presidents Clubhouse 🐱</title>
    <style>
        /* Das Design der Seite */
        body { 
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; 
            background-color: #e0f7fa; 
            color: #2c3e50; 
            display: flex; 
            justify-content: center; 
            padding: 20px;
        }
        .card { 
            background: white; 
            max-width: 600px; 
            width: 100%; 
            padding: 40px; 
            border-radius: 25px; 
            box-shadow: 0 15px 35px rgba(0,0,0,0.1);
            border: 5px solid #00acc1;
            text-align: center;
        }
        h1 { color: #00838f; font-size: 2.5em; margin-bottom: 10px; }
        .status { 
            background: #fff9c4; 
            padding: 15px; 
            border-radius: 15px; 
            border: 2px dashed #fbc02d;
            margin: 20px 0;
        }
        .chat-bereich {
            margin-top: 30px;
            padding: 10px;
            background: #f1f8e9;
            border-radius: 15px;
            border: 2px solid #8bc34a;
        }
    </style>
</head>
<body>

    <div class="card">
        <h1>🐾 Cat Presidents 🐾</h1>
        <p>Willkommen im offiziellen Clubhouse!</p>

        <div class="status">
            <h3>📊 Champy-Algorithmus</h3>
            <p>Status: <strong>Daten werden gesammelt...</strong></p>
            <p>Noch ca. 14 Tage bis zur Fertigstellung.</p>
        </div>
        
        <div class="chat-bereich">
            <h3>💬 Club-Chat (Zensurfrei)</h3>
            <p>Hier könnt ihr Tipps zu Star Coins austauschen!</p>
            <iframe 
                src="https://minnit.chat/CatPresidents?embed&&nickname=" 
                style="border:none; width:100%; height:450px; border-radius: 15px;" 
                allowTransparency="true">
            </iframe>
        </div>

        <p style="margin-top: 30px; font-size: 0.8em; color: #999;">Erstellt für die besten Club-Leader.</p>
    </div> </body>
</html>
