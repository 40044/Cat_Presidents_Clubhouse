<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Cat Presidents Clubhouse 🐱</title>
    <style>
        body { font-family: 'Segoe UI', sans-serif; background-color: #1a2634; color: #e0e0e0; margin: 0; padding: 20px; display: none; }
        .header { text-align: center; padding: 20px 0; }
        .logo-text { color: #ff85a2; font-size: 2.5em; font-weight: bold; text-transform: uppercase; }
        .main-container { display: flex; gap: 20px; justify-content: center; flex-wrap: wrap; }
        .column { background: #253341; padding: 20px; border-radius: 20px; border: 3px solid #ff85a2; }
        .left { flex: 1; min-width: 280px; } 
        .middle { flex: 2; min-width: 350px; } 
        .right { flex: 1; min-width: 300px; }  
        .status-box { background: #3d3d29; padding: 20px; border-radius: 15px; border: 2px dashed #fbc02d; text-align: center; }
        .plan-entry { background: #2d3d4d; padding: 10px; margin-bottom: 8px; border-radius: 10px; display: flex; justify-content: space-between; border-left: 5px solid #8bc34a; }
        .time-tag { background: #ff85a2; color: white; padding: 2px 8px; border-radius: 5px; font-weight: bold; }
        h3 { color: #ff85a2; border-bottom: 1px solid #3d4d5d; }
    </style>
</head>
<body>

    <div class="header"><p class="logo-text">🐾 Cat Presidents 🐾</p></div>

    <div class="main-container">
        <div class="column left">
            <h3>🎁 SSO Codes</h3>
            <div id="code-list">Lade...</div>
        </div>
        <div class="column middle">
            <h3>📊 Champi-Barometer</h3>
            <div class="status-box">
                <p><strong>HEUTE: <span id="heutiger-tag">...</span></strong></p>
                <h2 id="champi-name" style="color: #ff85a2;">Suche Champis...</h2>
                <p>Countdown: <span id="countdown" style="font-weight: bold; color: #fbc02d; font-size: 1.6em;">--:--</span></p>
            </div>
            <h3 style="margin-top: 25px;">📅 Tagesplan</h3>
            <div id="tages-plan"></div>
        </div>
        <div class="column right">
            <h3>💬 Chat</h3>
            <script src="https://minnit.chat/js/embed.js?c=1772345192" defer></script>
            <span class="minnit-chat-sembed" data-chatname="https://organizations.minnit.chat/443778136316393/c/Main?embed&&dark=1" data-style="width:100%; height:500px;">Chat</span>
        </div>
    </div>

    <script>
        let globaleChampis = [];
        const tage = ["Sonntag", "Montag", "Dienstag", "Mittwoch", "Donnerstag", "Freitag", "Samstag"];

        function checkPassword() {
            if (localStorage.getItem("club_zugang") === "erfolgreich") {
                document.body.style.display = "block";
                init();
            } else {
                let pw = prompt("Club-Passwort:");
                if (pw === "CatPresidents2026") {
                    localStorage.setItem("club_zugang", "erfolgreich");
                    location.reload();
                }
            }
        }

        async function init() {
            await loadChampiData();
            await loadCodes();
            updateDisplay();
            setInterval(updateDisplay, 1000);
        }

        async function loadChampiData() {
            // WICHTIG: Ich habe den Link leicht angepasst (gid=0 hinzugefügt)
            const url = 'https://docs.google.com/spreadsheets/d/e/2PACX-1vTsN2swAhGSI-5FQyTFtiTi2Uvab6WFoXfOm-pz9N9X9G1TeGSyAI5yr1aiD_p0FdOSr78BATKXXtaB/pub?gid=0&single=true&output=csv';
            
            try {
                const res = await fetch(url);
                if (!res.ok) throw new Error();
                const text = await res.text();
                
                // Wir prüfen auf Tab (\t) ODER Komma (,) ODER Semikolon (;)
                let separator = text.includes('\t') ? '\t' : (text.includes(';') ? ';' : ',');
                const rows = text.split(/\r?\n/).map(r => r.split(separator));
                
                const d = new Date();
                const dayIdx = d.getDay(); 
                document.getElementById('heutiger-tag').innerText = tage[dayIdx];

                // Deine Spalten: 0=Zeit, 1=Mo, 2=Di, 3=Mi(t), 4=Do, 5=Fr, 6=Sa, 7=So
                let colIdx = (dayIdx === 0) ? 7 : dayIdx;

                let list = [];
                for(let i = 1; i < rows.length; i++) {
                    let row = rows[i];
                    if (row.length > colIdx && row[0] && row[colIdx]) {
                        let timeStr = row[0].trim();
                        let name = row[colIdx].trim();
                        if(timeStr.includes(':') && name.length > 3 && name !== "---") {
                            let p = timeStr.split(':');
                            list.push({ min: parseInt(p[0])*60 + parseInt(p[1]), display: timeStr, name: name });
                        }
                    }
                }
                globaleChampis = list.sort((a,b) => a.min - b.min);
            } catch(e) {
                document.getElementById('champi-name').innerText = "Verbindungsfehler!";
            }
        }

        function updateDisplay() {
            if (globaleChampis.length === 0) return;
            const now = new Date();
            const curMin = now.getHours() * 60 + now.getMinutes();
            let next = null;
            let html = '';

            globaleChampis.forEach(c => {
                const past = c.min <= curMin;
                html += `<div class="plan-entry" style="${past ? 'opacity:0.3' : ''}"><span>${c.name}</span><span class="time-tag">${c.display}</span></div>`;
                if(!next && c.min > curMin) {
                    let target = new Date();
                    target.setHours(Math.floor(c.min/60), c.min%60, 0, 0);
                    next = { ...c, target };
                }
            });
            document.getElementById('tages-plan').innerHTML = html;
            if(next) {
                const diff = next.target - now;
                const mins = Math.floor(diff/60000);
                const secs = Math.floor((diff%60000)/1000);
                document.getElementById('champi-name').innerText = next.name;
                document.getElementById('countdown').innerText = mins + ":" + (secs < 10 ? '0' : '') + secs;
            } else {
                document.getElementById('champi-name').innerText = "Pause bis morgen!";
            }
        }

        async function loadCodes() {
            const url = 'https://docs.google.com/spreadsheets/d/e/2PACX-1vRlKQDgI4SCBqe8Kv0ZSvzDIfXW5YxyU3kLrR4h0LgK7vMdpNxgcpJfU0jP4xD0v9FOs7JQ74StZOHC/pub?gid=0&single=true&output=csv';
            try {
                const res = await fetch(url);
                const text = await res.text();
                const rows = text.split(/\r?\n/).slice(1);
                let html = '';
                rows.forEach(r => {
                    const c = r.split(',');
                    if(c[0]) html += `<div class="plan-entry"><strong>${c[0]}</strong><span>${c[1]||''}</span></div>`;
                });
                document.getElementById('code-list').innerHTML = html;
            } catch(e) {}
        }
        checkPassword();
    </script>
</body>
</html>
